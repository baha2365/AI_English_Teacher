<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice English</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-5px);
      border: 1px solid #38bdf8;
      background: #0ea5e9;
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      opacity: 0.8;
    }

    .emoji {
      font-size: 30px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h1>🌍 Choose a Book</h1>

  <div class="container">

    <div class="card" onclick="selectBook('book1')">
      <div class="emoji"></div>
      <h2>Travel & Transport</h2>
      <p>Airport, taxi, hotel, directions</p>
    </div>

  </div>

  <script>
    function selectBook(type) {
        if (type === "book1") {
            window.location.href = "book1.html";
        }
}
  </script>

</body>
</html>
