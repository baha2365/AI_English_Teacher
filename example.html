<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js GLB Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
      body{
        margin: 0;
        color: white; 
        background: url("https://cdnb.artstation.com/p/assets/images/images/063/323/031/large/c-damse-pewpewpew-sakumo-apartment-night-time.jpg?1685279411");
        background-repeat: no-repeat;
        background-size: cover;
      }
    #container3D {
      position: absolute;
      z-index: 0;
    }


    #userInput{
      position: absolute;
      left:750px;
      top:240px;
      width: 900px;
      z-index: 10;
    }
    
    #chat, h1 {
      position: absolute;
      left:750px;
      top:250px;
      width: 900px;
      z-index: 10;
    }
    #sendBtn{
        position: absolute;
        left:1558px;
        top:210px;
        width: 900px;
        z-index: 10;
    }

    canvas { display: block; }
  </style>
</head>
<body>

  <div id="container3D"></div>

  <h1 style="position: absolute; left:900px; top:90px; font-size: 60px;">
    Lets Learn English
  </h1>
  <div id="mainWordBox" 
     style="
        position:absolute;
        left:750px;
        top:180px;
        width:600px;
        height:60px;
        font-size:40px;
        font-weight:bold;
        color:yellow;
        border:2px solid yellow;
        text-align:center;
        display:none;">
</div>

  <div id="chat" style="border:1px solid red; height:300px; overflow:auto;"></div>

  <input type="text" id="userInput" placeholder="Type message..." />

<button id="micBtn" style="width:60px;"></button>
<button id="sendBtn" style="width:100px;">Send</button>


    <script type="module" src="three_ex.js"></script>
</body>
</html>
